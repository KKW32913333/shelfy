<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Shelfy</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body { background: linear-gradient(135deg, #f0f9ff 0%, #fef9c3 100%); min-height: 100vh; }
    .login-wrapper { align-items: flex-start; padding-top: 60px; }
    .login-card { border: none; box-shadow: 0 8px 40px rgba(0,0,0,.10); border-radius: 20px; padding: 44px 36px 36px; }
    .login-logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
    .login-logo-img { width: 72px; height: 72px; border-radius: 18px; box-shadow: 0 4px 16px rgba(0,0,0,.12); margin-bottom: 12px; }
    .login-brand { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
    .login-tagline { font-size: 12px; color: var(--text-muted); margin-top: 2px; text-align: center; }
    .tab-btns { display: flex; background: #f1f5f9; border-radius: 10px; padding: 3px; margin-bottom: 20px; }
    .tab-btn { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; border: none; background: none; color: var(--text-muted); transition: all .2s; }
    .tab-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .form-control { border-radius: 10px; padding: 10px 14px; font-size: 15px; border: 1.5px solid var(--border); }
    .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,.12); }
    .btn-login { width: 100%; margin-top: 10px; padding: 12px; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(14,165,233,.35); transition: opacity .2s; }
    .btn-login:hover { opacity: .9; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="/icons/apple-touch-icon.png" class="login-logo-img" alt="Shelfy">
      <div class="login-brand">Shelfy</div>
      <div class="login-tagline">在庫管理をもっとかんたんに</div>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" onclick="switchTab('register')">新規登録</button>
    </div>
    <div th:if="${param.error}" class="flash flash--error" style="margin-bottom:16px">ユーザー名またはパスワードが正しくありません</div>
    <div th:if="${param.logout}" class="flash flash--success" style="margin-bottom:16px">ログアウトしました</div>
    <div th:if="${param.registered}" class="flash flash--success" style="margin-bottom:16px">登録完了しました。管理者の承認をお待ちください。</div>
    <div th:if="${param.exists}" class="flash flash--error" style="margin-bottom:16px">そのユーザー名はすでに使用されています</div>
    <div id="tab-login" class="tab-content active">
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
          <label class="form-label">ユーザー名</label>
          <input type="text" name="username" class="form-control" autofocus required placeholder="ユーザー名を入力">
        </div>
        <div class="form-group" style="margin-top:14px">
          <label class="form-label">パスワード</label>
          <input type="password" name="password" class="form-control" required placeholder="パスワードを入力">
        </div>
        <button type="submit" class="btn-login">ログイン</button>
      </form>
    </div>
    <div id="tab-register" class="tab-content">
      <form th:action="@{/register}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="form-group">
          <label class="form-label">ユーザー名</label>
          <input type="text" name="username" class="form-control" required placeholder="ユーザー名を入力">
        </div>
        <div class="form-group" style="margin-top:14px">
          <label class="form-label">パスワード</label>
          <input type="password" name="password" class="form-control" required placeholder="パスワードを入力（6文字以上）">
        </div>
        <div class="form-group" style="margin-top:14px">
          <label class="form-label">パスワード（確認）</label>
          <input type="password" name="passwordConfirm" class="form-control" required placeholder="もう一度入力">
        </div>
        <button type="submit" class="btn-login">登録する</button>
      </form>
    </div>
  </div>
</div>
<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}
var p = new URLSearchParams(location.search);
if(p.has('registered')||p.has('exists')) switchTab('register');
</script>
</body>
</html>
