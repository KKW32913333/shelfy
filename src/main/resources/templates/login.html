<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — Shelfy</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #f0f9ff 0%, #fef9c3 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      border: 0.5px solid #e2e8f0;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-img {
      width: 68px; height: 68px;
      border-radius: 18px;
      margin: 0 auto 14px;
      display: block;
    }
    .logo-row {
      display: flex; align-items: center;
      justify-content: center; gap: 9px;
      margin-bottom: 6px;
    }
    .logo-grid {
      display: flex; flex-direction: column; gap: 3px;
    }
    .logo-grid-row { display: flex; gap: 3px; }
    .logo-dot-y { width: 6px; height: 6px; background: #fbbf24; border-radius: 1px; }
    .logo-dot-g { width: 6px; height: 6px; background: #94a3b8; border-radius: 1px; }
    .logo-line { width: 15px; height: 2px; background: #e2e8f0; border-radius: 1px; }
    .logo-text {
      font-size: 26px; font-weight: 800;
      color: #1e293b; letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 13px; color: #94a3b8;
      letter-spacing: 0.3px;
    }
    .tab-btns {
      display: flex; background: #f1f5f9;
      border-radius: 12px; padding: 3px;
      margin-bottom: 24px; gap: 3px;
    }
    .tab-btn {
      flex: 1; padding: 9px; border: none;
      border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      background: none; color: #94a3b8;
      transition: all .2s;
    }
    .tab-btn.active {
      background: #fff; color: #1e293b;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 13px;
      font-weight: 500; color: #64748b;
      margin-bottom: 6px;
    }
    .input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: #f8fafc; border: 0.5px solid #e2e8f0;
      border-radius: 12px; padding: 11px 14px;
      transition: border-color .15s;
    }
    .input-wrap:focus-within {
      border-color: #0ea5e9;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(14,165,233,.1);
    }
    .input-wrap i { font-size: 17px; color: #94a3b8; flex-shrink: 0; }
    .input-wrap input {
      flex: 1; border: none; background: none;
      font-size: 15px; color: #1e293b;
      outline: none;
    }
    .input-wrap input::placeholder { color: #cbd5e1; }
    .toggle-pw {
      background: none; border: none;
      cursor: pointer; padding: 0; color: #94a3b8;
    }
    .flash {
      padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px;
    }
    .flash--error { background: #fee2e2; color: #dc2626; }
    .flash--success { background: #dcfce7; color: #166534; }
    .btn-login {
      width: 100%; padding: 13px; background: #0ea5e9;
      border: none; border-radius: 14px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: 0.3px; transition: opacity .2s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: .88; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .bottom-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: #94a3b8;
    }
    .bottom-link span {
      color: #0ea5e9; font-weight: 600; cursor: pointer;
    }
  </style>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
</head>
<body>
<div class="login-card">

  <div class="logo-area">
    <img src="/icons/apple-touch-icon.png" class="logo-img" alt="Shelfy">
    <div class="logo-row">
      <div class="logo-grid">
        <div class="logo-grid-row">
          <div class="logo-dot-y"></div>
          <div class="logo-dot-y"></div>
        </div>
        <div class="logo-line"></div>
        <div class="logo-grid-row">
          <div class="logo-dot-g"></div>
          <div class="logo-dot-y"></div>
        </div>
      </div>
      <span class="logo-text">Shelfy</span>
    </div>
    <p class="logo-sub">在庫管理をもっとかんたんに</p>
  </div>

  <div class="tab-btns">
    <button class="tab-btn active" onclick="switchTab('login')">ログイン</button>
    <button class="tab-btn" onclick="switchTab('register')">新規登録</button>
  </div>

  <div th:if="${param.error}" class="flash flash--error">ユーザー名またはパスワードが正しくありません</div>
  <div th:if="${param.logout}" class="flash flash--success">ログアウトしました</div>
  <div th:if="${param.registered}" class="flash flash--success">登録完了しました。管理者の承認をお待ちください。</div>
  <div th:if="${param.exists}" class="flash flash--error">そのユーザー名はすでに使用されています</div>

  <!-- ログイン -->
  <div id="tab-login" class="tab-content active">
    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <div class="input-wrap">
          <i class="ti ti-user" aria-hidden="true"></i>
          <input type="text" name="username" placeholder="ユーザー名を入力" autofocus required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <div class="input-wrap">
          <i class="ti ti-lock" aria-hidden="true"></i>
          <input type="password" id="pw1" name="password" placeholder="パスワードを入力" required>
          <button type="button" class="toggle-pw" onclick="togglePw('pw1','eye1')" aria-label="パスワードを表示">
            <i id="eye1" class="ti ti-eye" style="font-size:17px;"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">ログイン</button>
    </form>
    <div class="bottom-link">
      アカウントをお持ちでない方は
      <span onclick="switchTab('register')">新規登録</span>
    </div>
  </div>

  <!-- 新規登録 -->
  <div id="tab-register" class="tab-content">
    <form th:action="@{/register}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="form-group">
        <label class="form-label">ユーザー名</label>
        <div class="input-wrap">
          <i class="ti ti-user" aria-hidden="true"></i>
          <input type="text" name="username" placeholder="ユーザー名を入力" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <div class="input-wrap">
          <i class="ti ti-lock" aria-hidden="true"></i>
          <input type="password" id="pw2" name="password" placeholder="6文字以上" required>
          <button type="button" class="toggle-pw" onclick="togglePw('pw2','eye2')" aria-label="パスワードを表示">
            <i id="eye2" class="ti ti-eye" style="font-size:17px;"></i>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード（確認）</label>
        <div class="input-wrap">
          <i class="ti ti-lock" aria-hidden="true"></i>
          <input type="password" id="pw3" name="passwordConfirm" placeholder="もう一度入力" required>
          <button type="button" class="toggle-pw" onclick="togglePw('pw3','eye3')" aria-label="パスワードを表示">
            <i id="eye3" class="ti ti-eye" style="font-size:17px;"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">登録する</button>
    </form>
    <div class="bottom-link">
      すでにアカウントをお持ちの方は
      <span onclick="switchTab('login')">ログイン</span>
    </div>
  </div>

</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'));
  });
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-register').classList.toggle('active', tab==='register');
}
function togglePw(inputId, iconId) {
  var input = document.getElementById(inputId);
  var icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    input.type = 'password';
    icon.className = 'ti ti-eye';
  }
}
var p = new URLSearchParams(location.search);
if (p.has('registered') || p.has('exists')) switchTab('register');
</script>
</body>
</html>
