<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消費ログ - Shelfy</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
<script>
function shelfyOpenMenu() {
  document.getElementById('side-overlay').style.display = 'block';
  document.getElementById('side-panel').style.transform = 'translateX(0)';
}
function shelfyCloseMenu() {
  document.getElementById('side-overlay').style.display = 'none';
  document.getElementById('side-panel').style.transform = 'translateX(-100%)';
}
</script>
</head>
<body>
<div th:replace="~{fragments/header :: header('consumption')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('consumption')}"></div>
  <main class="main-content" style="padding-bottom:100px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h1 style="font-size:18px; font-weight:700; color:var(--text); margin:0;">消費ログ</h1>
    </div>

    <div class="card">
      <div class="item-list">
        <div th:if="${#lists.isEmpty(logs)}" class="empty-state">
          <i class="ti ti-history" style="font-size:40px; color:var(--text-muted);"></i>
          <p style="margin-top:12px;">消費記録がまだありません</p>
          <p style="font-size:12px; color:var(--text-muted); margin-top:4px;">アイテム詳細の「使い切った」ボタンで記録されます</p>
        </div>
        <div th:each="log : ${logs}" style="display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border);">
          <div style="width:40px; height:40px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <i class="ti ti-check" style="font-size:20px; color:#16a34a;"></i>
          </div>
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; font-size:14px;" th:text="${log.itemName}"></div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:2px;"
                 th:text="${#temporals.format(log.consumedAt, 'yyyy/MM/dd HH:mm')}"></div>
          </div>
          <div style="flex-shrink:0;">
            <span style="background:#dcfce7; color:#16a34a; font-size:12px; font-weight:600; padding:3px 8px; border-radius:20px;"
                  th:text="${log.quantity} + '個使用'"></span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
</body>
</html>
