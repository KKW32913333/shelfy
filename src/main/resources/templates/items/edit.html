<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイテム登録 - Shelfy</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<div th:replace="~{fragments/header :: header('items')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('items')}"></div>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title" th:text="${isNew} ? 'アイテムを追加' : 'アイテムを編集'">アイテムを追加</h1>
      <a th:href="@{/dashboard}" class="btn btn-secondary">戻る</a>
    </div>
    <div class="form-card">
      <form th:action="@{/items/save}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="id" th:value="${item.id}">
        <input type="hidden" name="groupId" th:value="${groupId}">
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <div class="category-tabs">
            <label class="category-tab" th:classappend="${item.category == 'daily'} ? ' active' : ''">
              <input type="radio" name="category" value="daily" th:checked="${item.category == 'daily'}" style="display:none"> 日用品
            </label>
            <label class="category-tab" th:classappend="${item.category == 'food'} ? ' active' : ''">
              <input type="radio" name="category" value="food" th:checked="${item.category == 'food'}" style="display:none"> 食品
            </label>
            <label class="category-tab" th:classappend="${item.category == 'seasoning'} ? ' active' : ''">
              <input type="radio" name="category" value="seasoning" th:checked="${item.category == 'seasoning'}" style="display:none"> 調味料
            </label>
            <label class="category-tab" th:classappend="${item.category == 'drink'} ? ' active' : ''">
              <input type="radio" name="category" value="drink" th:checked="${item.category == 'drink'}" style="display:none"> 飲料
            </label>
            <label class="category-tab" th:classappend="${item.category == 'other'} ? ' active' : ''">
              <input type="radio" name="category" value="other" th:checked="${item.category == 'other'}" style="display:none"> その他
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">商品名</label>
          <input type="text" name="name" class="form-control" th:value="${item.name}" required placeholder="例：牛乳">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">在庫数</label>
            <input type="hidden" name="stock" id="stockInput" th:value="${item.stock}">
            <div class="drum-picker" id="stockPicker" data-target="stockInput" th:data-value="${item.stock}">
              <div class="drum-picker-inner">
                <div class="drum-picker-highlight"></div>
                <div class="drum-picker-list"></div>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">補充目安</label>
            <input type="hidden" name="minStock" id="minStockInput" th:value="${item.minStock}">
            <div class="drum-picker" id="minStockPicker" data-target="minStockInput" th:data-value="${item.minStock}">
              <div class="drum-picker-inner">
                <div class="drum-picker-highlight"></div>
                <div class="drum-picker-list"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">期限種別</label>
            <select name="expiryType" class="form-control">
              <option value="">なし</option>
              <option value="best_before" th:selected="${item.expiryType == 'best_before'}">賞味期限</option>
              <option value="use_by" th:selected="${item.expiryType == 'use_by'}">消費期限</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">期限日</label>
            <input type="date" name="expiryDate" class="form-control" th:value="${item.expiryDate}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">購入日</label>
          <input type="date" name="purchaseDate" class="form-control" th:value="${item.purchaseDate}">
        </div>
        <div class="form-group">
          <label class="form-label">メモ</label>
          <textarea name="memo" class="form-control" rows="3" th:text="${item.memo}"></textarea>
        </div>
        <div class="form-actions">
          <a th:href="@{/dashboard}" class="btn btn-secondary">キャンセル</a>
          <button type="submit" class="btn btn-primary" th:text="${isNew} ? '登録する' : '更新する'">登録する</button>
        </div>
      </form>
    </div>
  </main>
</div>
<script>
document.querySelectorAll('.category-tab input[type=radio]').forEach(function(radio) {
  radio.addEventListener('change', function() {
    document.querySelectorAll('.category-tab').forEach(function(t) { t.classList.remove('active'); });
    radio.parentElement.classList.add('active');
  });
});
</script>
<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item active">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
<style>
.drum-picker {
  width: 100%;
  height: 160px;
  overflow: hidden;
  position: relative;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  cursor: pointer;
  user-select: none;
}
.drum-picker-inner {
  height: 100%;
  position: relative;
}
.drum-picker-highlight {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 44px;
  transform: translateY(-50%);
  background: rgba(14,165,233,.08);
  border-top: 1.5px solid #0ea5e9;
  border-bottom: 1.5px solid #0ea5e9;
  pointer-events: none;
  z-index: 2;
}
.drum-picker-list {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 1;
}
.drum-picker-item {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
  color: var(--text-muted);
  transition: color .1s, font-size .1s;
}
.drum-picker-item.selected {
  color: #0ea5e9;
  font-size: 24px;
  font-weight: 800;
}
.drum-picker::before,
.drum-picker::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 58px;
  z-index: 3;
  pointer-events: none;
}
.drum-picker::before {
  top: 0;
  background: linear-gradient(to bottom, var(--surface) 0%, transparent 100%);
}
.drum-picker::after {
  bottom: 0;
  background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var MAX = 30;

  document.querySelectorAll('.drum-picker').forEach(function(picker) {
    var targetId = picker.getAttribute('data-target');
    var input = document.getElementById(targetId);
    var initVal = parseInt(picker.getAttribute('data-value')) || 0;
    var list = picker.querySelector('.drum-picker-list');
    var itemHeight = 44;
    var currentIndex = initVal;

    // リスト生成（0〜30）
    for (var i = 0; i <= MAX; i++) {
      var div = document.createElement('div');
      div.className = 'drum-picker-item' + (i === initVal ? ' selected' : '');
      div.textContent = i;
      list.appendChild(div);
    }

    // 初期位置
    var offsetTop = 58; // picker height/2 - itemHeight/2 = 80-22=58
    list.style.top = (offsetTop - initVal * itemHeight) + 'px';

    function updateSelected(idx) {
      idx = Math.max(0, Math.min(MAX, idx));
      currentIndex = idx;
      input.value = idx;
      var items = list.querySelectorAll('.drum-picker-item');
      items.forEach(function(item, i) {
        item.classList.toggle('selected', i === idx);
      });
      list.style.top = (offsetTop - idx * itemHeight) + 'px';
    }

    // タッチ操作
    var startY, startTop;
    picker.addEventListener('touchstart', function(e) {
      startY = e.touches[0].clientY;
      startTop = parseInt(list.style.top) || offsetTop;
      list.style.transition = 'none';
    }, {passive: true});

    picker.addEventListener('touchmove', function(e) {
      e.preventDefault();
      var dy = e.touches[0].clientY - startY;
      var newTop = startTop + dy;
      list.style.top = newTop + 'px';
    }, {passive: false});

    picker.addEventListener('touchend', function(e) {
      list.style.transition = 'top .2s ease';
      var currentTop = parseInt(list.style.top) || offsetTop;
      var idx = Math.round((offsetTop - currentTop) / itemHeight);
      updateSelected(idx);
    });

    // マウス操作（PC用）
    var isDragging = false;
    picker.addEventListener('mousedown', function(e) {
      isDragging = true;
      startY = e.clientY;
      startTop = parseInt(list.style.top) || offsetTop;
      list.style.transition = 'none';
    });
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var dy = e.clientY - startY;
      list.style.top = (startTop + dy) + 'px';
    });
    document.addEventListener('mouseup', function() {
      if (!isDragging) return;
      isDragging = false;
      list.style.transition = 'top .2s ease';
      var currentTop = parseInt(list.style.top) || offsetTop;
      var idx = Math.round((offsetTop - currentTop) / itemHeight);
      updateSelected(idx);
    });
  });
});
</script>
