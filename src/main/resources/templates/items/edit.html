<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アイテム登録 - Shelfy</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

</head>
<body>
<div th:replace="~{fragments/header :: header('items')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('items')}"></div>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title" th:text="${isNew} ? 'アイテムを追加' : 'アイテムを編集'">アイテムを追加</h1>
      <a th:href="@{/dashboard}" class="btn btn-secondary">戻る</a>
    </div>
    <div class="form-card">
      <form th:action="@{/items/save}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="id" th:value="${item.id}">
        <input type="hidden" name="imageUrl" th:value="${item.imageUrl} ?: ''">
        <input type="hidden" name="groupId" th:value="${groupId}">
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <div class="category-tabs">
            <label class="category-tab" th:classappend="${item.category == 'daily'} ? ' active' : ''">
              <input type="radio" name="category" value="daily" th:checked="${item.category == 'daily'}" style="display:none"> 日用品
            </label>
            <label class="category-tab" th:classappend="${item.category == 'food'} ? ' active' : ''">
              <input type="radio" name="category" value="food" th:checked="${item.category == 'food'}" style="display:none"> 食品
            </label>
            <label class="category-tab" th:classappend="${item.category == 'seasoning'} ? ' active' : ''">
              <input type="radio" name="category" value="seasoning" th:checked="${item.category == 'seasoning'}" style="display:none"> 調味料
            </label>
            <label class="category-tab" th:classappend="${item.category == 'drink'} ? ' active' : ''">
              <input type="radio" name="category" value="drink" th:checked="${item.category == 'drink'}" style="display:none"> 飲料
            </label>
            <label class="category-tab" th:classappend="${item.category == 'other'} ? ' active' : ''">
              <input type="radio" name="category" value="other" th:checked="${item.category == 'other'}" style="display:none"> その他
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">商品名</label>
          <input type="text" name="name" class="form-control" th:value="${item.name}" required placeholder="例：牛乳">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">在庫数</label>
            <input type="hidden" name="stock" id="stockInput" th:value="${item.stock}">
            <div style="display:flex; align-items:center; gap:10px; padding:8px 0;">
              <button type="button" onclick="changeVal('stockInput','stockDisplay',-1,0)"
                style="width:32px;height:32px;border-radius:8px;border:0.5px solid #e2e8f0;background:#f8fafc;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;color:#374151;">－</button>
              <span id="stockDisplay" style="font-size:18px;font-weight:800;color:#0ea5e9;min-width:36px;text-align:center;" th:text="${item.stock}">0</span>
              <button type="button" onclick="changeVal('stockInput','stockDisplay',1,0)"
                style="width:32px;height:32px;border-radius:8px;border:none;background:#0ea5e9;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;">＋</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">補充目安</label>
            <input type="hidden" name="minStock" id="minStockInput" th:value="${item.minStock}">
            <div style="display:flex; align-items:center; gap:10px; padding:8px 0;">
              <button type="button" onclick="changeVal('minStockInput','minStockDisplay',-1,1)"
                style="width:32px;height:32px;border-radius:8px;border:0.5px solid #e2e8f0;background:#f8fafc;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;color:#374151;">－</button>
              <span id="minStockDisplay" style="font-size:18px;font-weight:800;color:#0ea5e9;min-width:36px;text-align:center;" th:text="${item.minStock}">1</span>
              <button type="button" onclick="changeVal('minStockInput','minStockDisplay',1,1)"
                style="width:32px;height:32px;border-radius:8px;border:none;background:#0ea5e9;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;">＋</button>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">期限種別</label>
            <select name="expiryType" class="form-control">
              <option value="">なし</option>
              <option value="best_before" th:selected="${item.expiryType == 'best_before'}">賞味期限</option>
              <option value="use_by" th:selected="${item.expiryType == 'use_by'}">消費期限</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">期限日</label>
            <input type="date" name="expiryDate" class="form-control" th:value="${item.expiryDate}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">購入日</label>
          <input type="date" name="purchaseDate" class="form-control" th:value="${item.purchaseDate}">
        </div>
        <div class="form-group">
          <label class="form-label">メモ</label>
          <textarea name="memo" class="form-control" rows="3" th:text="${item.memo}"></textarea>
        </div>
        <div class="form-actions">
          <a th:href="@{/dashboard}" class="btn btn-secondary">キャンセル</a>
          <button type="submit" class="btn btn-primary" th:text="${isNew} ? '登録する' : '更新する'">登録する</button>
        </div>
      </form>
    </div>
  </main>
</div>
<script>
document.querySelectorAll('.category-tab input[type=radio]').forEach(function(radio) {
  radio.addEventListener('change', function() {
    document.querySelectorAll('.category-tab').forEach(function(t) { t.classList.remove('active'); });
    radio.parentElement.classList.add('active');
  });
});
</script>
<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item active">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>






<script>
function changeVal(inputId, displayId, delta, min) {
  var input = document.getElementById(inputId);
  var display = document.getElementById(displayId);
  var val = parseInt(input.value) || min;
  val = Math.max(min, Math.min(30, val + delta));
  input.value = val;
  display.textContent = val;
}
</script>


<script>
function shelfyOpenMenu() {
  document.getElementById('side-overlay').style.display = 'block';
  document.getElementById('side-panel').style.transform = 'translateX(0)';
}
function shelfyCloseMenu() {
  document.getElementById('side-overlay').style.display = 'none';
  document.getElementById('side-panel').style.transform = 'translateX(-100%)';
}
</script>

<div id="side-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200;" onclick="shelfyCloseMenu()"></div>
<div id="side-panel" style="position:fixed; top:0; left:0; bottom:0; width:280px; background:#fff; z-index:201; transform:translateX(-100%); transition:transform .25s ease; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.12);">
  <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 20px 16px; border-bottom:1px solid #f1f5f9; margin-top:60px;">
    <span style="font-size:17px; font-weight:700; color:#1e293b;">Shelfy</span>
    <button onclick="shelfyCloseMenu()" style="background:none;border:none;cursor:pointer;padding:4px;"><i class="ti ti-x" style="font-size:22px; color:#94a3b8;"></i></button>
  </div>
  <nav style="padding:12px 0; flex:1; overflow-y:auto;">
    <a href="/score" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-medal" style="font-size:20px;color:#f59e0b;"></i>スコア・バッジ</a>
    <a href="/groups" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-users" style="font-size:20px;color:#94a3b8;"></i>グループ選択</a>
    <a href="/shopping" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-shopping-cart" style="font-size:20px;color:#94a3b8;"></i>買い物リスト</a>
    <a href="/consumption" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-history" style="font-size:20px;color:#94a3b8;"></i>消費ログ</a>
    <a href="/report" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-chart-pie" style="font-size:20px;color:#94a3b8;"></i>月次レポート</a>
    <a href="/dashboard" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-home" style="font-size:20px;color:#94a3b8;"></i>ホーム</a>
    <a href="/daily" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-package" style="font-size:20px;color:#94a3b8;"></i>日用品管理</a>
    <a href="/food" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-salad" style="font-size:20px;color:#94a3b8;"></i>食品・調味料管理</a>
    <a href="/alerts" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-bell" style="font-size:20px;color:#94a3b8;"></i>アラート</a>
    <div style="height:1px;background:#f1f5f9;margin:8px 0;"></div>
    <a href="/logout" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#ef4444;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-logout" style="font-size:20px;color:#ef4444;"></i>ログアウト</a>
  </nav>
</div>
</body>
</html>
