<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日用品管理 - Shelfy</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
</head>
<body>
<div th:replace="~{fragments/header :: header('daily')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('daily')}"></div>
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">日用品管理</h1>
      <a th:href="@{/items/new(category=daily)}" class="btn btn-primary">
        <i class="ti ti-plus"></i> 追加
      </a>
    </div>

    <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>

    <div class="card">
      <div class="item-list">
        <div th:if="${#lists.isEmpty(items)}" class="empty-state">
          <i class="ti ti-package" style="font-size:40px; color:var(--text-muted);"></i>
          <p style="margin-top:12px;">日用品がまだ登録されていません</p>
          <a th:href="@{/items/new(category=daily)}" class="btn btn-primary" style="margin-top:12px;">最初のアイテムを追加</a>
        </div>
        <a th:each="item : ${items}"
           th:href="@{/items/{id}(id=${item.id})}"
           class="item-row" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border);">
          <div class="item-thumb" style="flex-shrink:0;">
            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" th:alt="${item.name}"
                 style="width:44px; height:44px; object-fit:cover; border-radius:8px;">
            <div th:unless="${item.imageUrl}"
                 style="width:44px; height:44px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center;">
              <i class="ti ti-package" style="font-size:22px; color:var(--text-muted);"></i>
            </div>
          </div>
          <div class="item-info" style="flex:1; min-width:0;">
            <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" th:text="${item.name}"></div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:2px;" th:text="'補充目安：' + ${item.minStock} + '個'"></div>
          </div>
          <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
            <span th:class="'badge badge--' + ${item.stockStatus}"
                  th:text="${item.stock} + '個'"></span>
            <span th:if="${item.linkedToShopping}" class="badge badge--linkle" style="font-size:10px;">🛒</span>
            <i class="ti ti-chevron-right" style="font-size:16px; color:var(--text-muted);"></i>
          </div>
        </a>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item active">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
</body>
</html>
