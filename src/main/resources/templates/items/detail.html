<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${item.name} + ' — Shelfy'">Shelfy</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    .photo-upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: border-color .2s; }
    .photo-upload-area:hover { border-color: var(--primary); }
    .item-photo { width: 100%; max-height: 280px; object-fit: cover; border-radius: 12px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text-muted); font-size: 13px; }
    .detail-value { font-weight: 500; }
  </style>
</head>
<body>
<div th:replace="~{fragments/header :: header('items')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('items')}"></div>
  <main class="main-content">

    <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>

    <div class="page-header">
      <h1 class="page-title" th:text="${item.name}">商品名</h1>
      <a th:href="@{/items/{id}/edit(id=${item.id})}" class="btn btn-secondary">
        <i class="ti ti-edit"></i> 編集
      </a>
    </div>

    <div class="form-card" style="margin-bottom:20px;">
      <div th:if="${item.imageUrl}">
        <img th:src="${item.imageUrl}" th:alt="${item.name}" class="item-photo">
        <form th:action="@{/items/{id}/photo/delete(id=${item.id})}" method="post" style="margin-top:10px; text-align:right;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button type="submit" class="btn btn-secondary btn-sm" onclick="return confirm('写真を削除しますか？')">
            <i class="ti ti-trash"></i> 写真を削除
          </button>
        </form>
      </div>
      <div th:unless="${item.imageUrl}">
        <form th:action="@{/items/{id}/photo(id=${item.id})}" method="post" enctype="multipart/form-data" id="photoForm">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="file" id="photoInput" name="photo" accept="image/*" style="display:none;" onchange="document.getElementById('photoForm').submit()">
          <div style="display:flex; gap:10px; margin-top:4px;">
            <button type="button" onclick="document.getElementById('photoInput').removeAttribute('capture'); document.getElementById('photoInput').click();"
              style="flex:1; padding:14px; background:var(--bg); border:2px dashed var(--border); border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text-muted);">
              <i class="ti ti-photo" style="font-size:28px; color:var(--primary);"></i>
              <span style="font-size:13px; font-weight:500;">ライブラリから選択</span>
            </button>
            <button type="button" onclick="document.getElementById('photoInput').setAttribute('capture','environment'); document.getElementById('photoInput').click();"
              style="flex:1; padding:14px; background:var(--bg); border:2px dashed var(--border); border-radius:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--text-muted);">
              <i class="ti ti-camera" style="font-size:28px; color:var(--primary);"></i>
              <span style="font-size:13px; font-weight:500;">カメラで撮影</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div style="padding:16px 20px;">
        <div class="detail-row">
          <span class="detail-label">カテゴリ</span>
          <span class="detail-value" th:text="${item.category == 'daily' ? '日用品' : item.category == 'food' ? '食品' : item.category == 'seasoning' ? '調味料' : item.category == 'drink' ? '飲料' : 'その他'}"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">在庫数</span>
          <div style="display:flex; align-items:center; gap:12px;">
            <form th:action="@{/items/{id}/stock(id=${item.id})}" method="post" style="display:inline;">
              <input type="hidden" name="delta" value="-1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="returnTo" th:value="@{/items/{id}(id=${item.id})}">
              <button type="submit" class="btn btn-secondary btn-sm">－</button>
            </form>
            <span class="detail-value" th:text="${item.stock} + '個'" style="min-width:40px; text-align:center;"></span>
            <form th:action="@{/items/{id}/stock(id=${item.id})}" method="post" style="display:inline;">
              <input type="hidden" name="delta" value="1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="returnTo" th:value="@{/items/{id}(id=${item.id})}">
              <button type="submit" class="btn btn-primary btn-sm">＋</button>
            </form>
          </div>
        </div>
        <div class="detail-row">
          <span class="detail-label">補充目安</span>
          <span class="detail-value" th:text="${item.minStock} + '個'"></span>
        </div>
        <div th:if="${item.expiryDate}" class="detail-row">
          <span class="detail-label" th:text="${item.expiryType == 'use_by' ? '消費期限' : '賞味期限'}"></span>
          <span th:class="'badge badge--' + ${item.expiryStatus}"
                th:text="${#temporals.format(item.expiryDate,'yyyy/MM/dd')} + '（' + (${item.daysUntilExpiry < 0} ? '期限切れ' : 'あと' + ${item.daysUntilExpiry} + '日') + '）'"></span>
        </div>
        <div th:if="${item.purchaseDate}" class="detail-row">
          <span class="detail-label">購入日</span>
          <span class="detail-value" th:text="${#temporals.format(item.purchaseDate,'yyyy/MM/dd')}"></span>
        </div>
        <div th:if="${item.memo}" class="detail-row">
          <span class="detail-label">メモ</span>
          <span class="detail-value" th:text="${item.memo}"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Linkle連携</span>
          <span th:text="${item.linkedToShopping} ? '買い物リストに追加済み' : '未連携'" th:class="${item.linkedToShopping} ? 'badge badge--linkle' : 'badge badge--none'"></span>
        </div>
      </div>
    </div>

    <div style="margin-top:16px; display:flex; gap:10px; justify-content:center;">
      <form th:action="@{/items/{id}/consume(id=${item.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="quantity" value="1">
        <input type="hidden" name="returnTo" th:value="${item.daily ? '/daily' : '/food'}">
        <button type="submit" style="background:#dcfce7; color:#16a34a; border:none; border-radius:10px; padding:10px 20px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;">
          <i class="ti ti-check" style="font-size:16px;"></i>使い切った
        </button>
      </form>
    </div>

    <div style="margin-top:10px; text-align:center;">
      <form th:action="@{/items/{id}/delete(id=${item.id})}" method="post"
            onsubmit="return confirm('削除しますか？')">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="returnTo" th:value="${item.daily ? '/daily' : '/food'}">
        <button type="submit" class="btn btn-danger btn-sm">
          <i class="ti ti-trash"></i> このアイテムを削除
        </button>
      </form>
    </div>

  </main>
</div>

<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
</body>
</html>
