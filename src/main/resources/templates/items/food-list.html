<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品・調味料管理 - Shelfy</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <style>
    .stock-btn {
      width: 36px; height: 36px;
      border-radius: 9px; border: none; cursor: pointer;
      font-size: 20px; font-weight: 700; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .stock-btn:hover { opacity: .8; }
    .stock-btn--minus { background: #f1f5f9; color: #374151; border: 0.5px solid #e2e8f0; }
    .stock-btn--plus  { background: #0ea5e9; color: #fff; }
    .stock-count {
      font-size: 15px; font-weight: 700;
      min-width: 36px; text-align: center;
      color: var(--text);
    }
    .expiry-badge {
      font-size: 11px; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      white-space: nowrap;
    }
    .expiry-badge--expired { background: #fee2e2; color: #dc2626; }
    .expiry-badge--soon    { background: #fee2e2; color: #dc2626; }
    .expiry-badge--warning { background: #fef9c3; color: #b45309; }
    .expiry-badge--ok      { background: #dcfce7; color: #16a34a; }
    .expiry-badge--none    { background: #f1f5f9; color: #94a3b8; }
  </style>
<script>
function shelfyOpenMenu() {
  document.getElementById('side-overlay').style.display = 'block';
  document.getElementById('side-panel').style.transform = 'translateX(0)';
}
function shelfyCloseMenu() {
  document.getElementById('side-overlay').style.display = 'none';
  document.getElementById('side-panel').style.transform = 'translateX(-100%)';
}
</script>
</head>
<body>
<div th:replace="~{fragments/header :: header('food')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('food')}"></div>
  <main class="main-content" style="padding-bottom:100px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h1 style="font-size:18px; font-weight:700; color:var(--text); margin:0;">食品・調味料管理</h1>
      <a th:href="@{/items/new(category=food)}" style="background:#0ea5e9; color:#fff; padding:7px 16px; border-radius:20px; font-size:12px; font-weight:700; text-decoration:none; display:flex; align-items:center; gap:4px;">
        <i class="ti ti-plus" style="font-size:14px;"></i>追加
      </a>
    </div>

    <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>

    <div class="card">
      <div class="item-list">
        <div th:if="${#lists.isEmpty(items)}" class="empty-state">
          <i class="ti ti-salad" style="font-size:40px; color:var(--text-muted);"></i>
          <p style="margin-top:12px;">食品・調味料がまだ登録されていません</p>
          <a th:href="@{/items/new(category=food)}" class="btn btn-primary" style="margin-top:12px;">最初のアイテムを追加</a>
        </div>

        <div th:each="item : ${items}" style="border-bottom:1px solid var(--border);">
          <a th:href="@{/items/{id}(id=${item.id})}"
             style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:12px; padding:12px 16px;">
            <div style="flex-shrink:0;">
              <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" th:alt="${item.name}"
                   style="width:44px; height:44px; object-fit:cover; border-radius:8px;">
              <div th:unless="${item.imageUrl}"
                   style="width:44px; height:44px; background:var(--bg); border-radius:8px; display:flex; align-items:center; justify-content:center;">
                <i class="ti ti-salad" style="font-size:22px; color:var(--text-muted);"></i>
              </div>
            </div>
            <div style="flex:1; min-width:0;">
              <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" th:text="${item.name}"></div>
              <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">
                <span th:if="${item.expiryDate}"
                      th:text="${item.expiryType == 'use_by' ? '消費期限：' : '賞味期限：'} + ${#temporals.format(item.expiryDate,'yyyy/MM/dd')}"></span>
                <span th:unless="${item.expiryDate}" style="color:#cbd5e1;">期限未設定</span>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0;">
              <span th:if="${item.expiryDate}"
                    th:class="'expiry-badge expiry-badge--' + ${item.expiryStatus}"
                    th:text="${item.daysUntilExpiry < 0} ? '期限切れ' :
                              (${item.daysUntilExpiry == 0} ? '今日' :
                              ('あと' + ${item.daysUntilExpiry} + '日'))">
              </span>
              <span th:unless="${item.expiryDate}" class="expiry-badge expiry-badge--none">期限なし</span>
            </div>
            <i class="ti ti-chevron-right" style="font-size:16px; color:var(--text-muted); flex-shrink:0;"></i>
          </a>
          <div style="display:flex; align-items:center; justify-content:flex-end; gap:10px; padding:0 16px 12px;">
            <span th:class="'badge badge--' + ${item.stockStatus}" style="font-size:13px;" th:text="${item.stock} + '個'"></span>
            <form th:action="@{/items/{id}/stock(id=${item.id})}" method="post" style="display:inline;">
              <input type="hidden" name="delta" value="-1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="returnTo" value="/food">
              <button type="submit" class="stock-btn stock-btn--minus" aria-label="減らす">－</button>
            </form>
            <span class="stock-count" th:text="${item.stock}"></span>
            <form th:action="@{/items/{id}/stock(id=${item.id})}" method="post" style="display:inline;">
              <input type="hidden" name="delta" value="1">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <input type="hidden" name="returnTo" value="/food">
              <button type="submit" class="stock-btn stock-btn--plus" aria-label="増やす">＋</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item active">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>

<div id="side-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200;" onclick="shelfyCloseMenu()"></div>
<div id="side-panel" style="position:fixed; top:0; left:0; bottom:0; width:280px; background:#fff; z-index:201; transform:translateX(-100%); transition:transform .25s ease; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.12);">
  <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 20px 16px; border-bottom:1px solid #f1f5f9; margin-top:60px;">
    <span style="font-size:17px; font-weight:700; color:#1e293b;">Shelfy</span>
    <button onclick="shelfyCloseMenu()" style="background:none;border:none;cursor:pointer;padding:4px;"><i class="ti ti-x" style="font-size:22px; color:#94a3b8;"></i></button>
  </div>
  <nav style="padding:12px 0; flex:1; overflow-y:auto;">
    <a href="/score" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-medal" style="font-size:20px;color:#f59e0b;"></i>スコア・バッジ</a>
    <a href="/groups" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-users" style="font-size:20px;color:#94a3b8;"></i>グループ選択</a>
    <a href="/shopping" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-shopping-cart" style="font-size:20px;color:#94a3b8;"></i>買い物リスト</a>
    <a href="/consumption" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-history" style="font-size:20px;color:#94a3b8;"></i>消費ログ</a>
    <a href="/report" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-chart-pie" style="font-size:20px;color:#94a3b8;"></i>月次レポート</a>
    <a href="/dashboard" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-home" style="font-size:20px;color:#94a3b8;"></i>ホーム</a>
    <a href="/daily" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-package" style="font-size:20px;color:#94a3b8;"></i>日用品管理</a>
    <a href="/food" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-salad" style="font-size:20px;color:#94a3b8;"></i>食品・調味料管理</a>
    <a href="/alerts" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-bell" style="font-size:20px;color:#94a3b8;"></i>アラート</a>
    <div style="height:1px;background:#f1f5f9;margin:8px 0;"></div>
    <a href="/logout" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#ef4444;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-logout" style="font-size:20px;color:#ef4444;"></i>ログアウト</a>
  </nav>
</div>
</body>
</html>
