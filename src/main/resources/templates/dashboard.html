<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード — Shelfy</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script>
function shelfyOpenMenu() {
  document.getElementById('side-overlay').style.display = 'block';
  document.getElementById('side-panel').style.transform = 'translateX(0)';
}
function shelfyCloseMenu() {
  document.getElementById('side-overlay').style.display = 'none';
  document.getElementById('side-panel').style.transform = 'translateX(-100%)';
}
</script>
</head>
<body>

<!-- ヘッダー -->
<div th:replace="~{fragments/header :: header('dashboard')}"></div>

<div class="layout">
  <!-- サイドバー -->
  <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

  <!-- メインコンテンツ -->
  <main class="main-content">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <div>
        <h1 style="font-size:18px; font-weight:700; color:var(--text); margin:0;">ダッシュボード</h1>
        <a th:href="@{/groups}" style="font-size:12px; color:#0ea5e9; text-decoration:none; display:flex; align-items:center; gap:3px; margin-top:2px;">
          <i class="ti ti-users" style="font-size:12px;"></i>
          <span th:text="${groupName} ?: 'グループ未選択'"></span>
        </a>
      </div>
      <a th:href="@{/items/new}" style="background:#0ea5e9; color:#fff; padding:7px 16px; border-radius:20px; font-size:12px; font-weight:700; text-decoration:none; display:flex; align-items:center; gap:4px;">
        <i class="ti ti-plus" style="font-size:14px;"></i>追加
      </a>
    </div>

    <!-- プッシュ通知バナー -->
    <div id="push-banner" style="display:none !important; background:#e0f2fe; border:1px solid #bae6fd; border-radius:10px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:10px;">
        <i class="ti ti-bell" style="font-size:20px; color:#0ea5e9;"></i>
        <span style="font-size:14px; color:#0369a1; font-weight:500;">期限アラートを通知で受け取る</span>
      </div>
      <button onclick="requestPush()" style="background:#0ea5e9; color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:13px; font-weight:600; cursor:pointer;">
        有効にする
      </button>
    </div>

    <!-- スコアバナー -->
    <a th:href="@{/score}" style="display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,#0ea5e9,#0284c7); border-radius:12px; padding:14px 16px; margin-bottom:16px; text-decoration:none;">
      <div style="display:flex; align-items:center; gap:10px;">
        <i class="ti ti-medal" style="font-size:24px; color:#fbbf24;"></i>
        <div>
          <div style="font-size:12px; color:rgba(255,255,255,.7); font-weight:500;">現在のスコア</div>
          <div style="font-size:22px; font-weight:800; color:#fff;" th:text="${currentScore} + ' pt'">0 pt</div>
        </div>
      </div>
      <div style="color:rgba(255,255,255,.7); font-size:12px; font-weight:500;">バッジを見る →</div>
    </a>

    <!-- サマリーカード -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;">
      <a th:href="@{/food}" style="background:#fff; border-radius:12px; padding:14px; border:0.5px solid #e2e8f0; text-decoration:none; display:block;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">総アイテム数</div>
        <div style="font-size:28px; font-weight:800; color:#1e293b; line-height:1;" th:text="${stats.total}">0</div>
        <div style="font-size:11px; color:#0ea5e9; margin-top:6px; font-weight:500;">すべて見る →</div>
      </a>
      <a th:href="@{/food}" style="background:#fff; border-radius:12px; padding:14px; border:0.5px solid #e2e8f0; text-decoration:none; display:block;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">期限30日以内</div>
        <div style="font-size:28px; font-weight:800; color:#1e293b; line-height:1;" th:text="${stats.expiringWarning}">0</div>
        <div style="font-size:11px; color:#0ea5e9; margin-top:6px; font-weight:500;">確認する →</div>
      </a>
      <a th:href="@{/food}" style="background:#fff; border-radius:12px; padding:14px; border:0.5px solid #fbbf24; text-decoration:none; display:block;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">期限7日以内</div>
        <div style="font-size:28px; font-weight:800; color:#f59e0b; line-height:1;" th:text="${stats.expiringSoon}">0</div>
        <div style="font-size:11px; color:#f59e0b; margin-top:6px; font-weight:500;">確認する →</div>
      </a>
      <a th:href="@{/alerts}" style="background:#fff; border-radius:12px; padding:14px; border:0.5px solid #fca5a5; text-decoration:none; display:block;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">期限切れ</div>
        <div style="font-size:28px; font-weight:800; color:#ef4444; line-height:1;" th:text="${stats.expired}">0</div>
        <div style="font-size:11px; color:#ef4444; margin-top:6px; font-weight:500;">確認する →</div>
      </a>
    </div>

    <div class="dashboard-grid">

      <!-- 期限の近いアイテム -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">期限の近い食品・調味料</h2>
          <a th:href="@{/food}" class="link-muted">すべて見る ›</a>
        </div>
        <div class="item-list">
          <div th:if="${#lists.isEmpty(expiringItems)}" class="empty-state">
            <p>期限の近いアイテムはありません 🎉</p>
          </div>
          <div th:each="item : ${expiringItems}" class="item-row">
            <div class="item-thumb">
              <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" alt="">
              <span th:unless="${item.imageUrl}" class="item-thumb-placeholder">🛒</span>
            </div>
            <div class="item-info">
              <div class="item-name" th:text="${item.name}">商品名</div>
              <div class="item-meta" th:text="${item.expiryType == 'use_by' ? '消費期限' : '賞味期限'} + '：' + ${#temporals.format(item.expiryDate,'yyyy/MM/dd')}"></div>
            </div>
            <div class="item-badge">
              <span th:class="'badge badge--' + ${item.expiryStatus}"
                    th:text="${item.daysUntilExpiry < 0 ? '期限切れ' :
                               item.daysUntilExpiry == 0 ? '今日' :
                               'あと' + item.daysUntilExpiry + '日'}">
              </span>
            </div>
            <div class="item-actions">
              <a th:href="@{/items/{id}(id=${item.id})}" class="btn-icon">›</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 在庫不足アイテム + カテゴリ別 -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">在庫切れアイテム</h2>
          <a th:href="@{/daily}" class="link-muted">すべて見る ›</a>
        </div>
        <div class="item-list">
          <div th:if="${#lists.isEmpty(lowStockItems)}" class="empty-state">
            <p>在庫切れのアイテムはありません ✅</p>
          </div>
          <div th:each="item : ${lowStockItems}" class="item-row">
            <div class="item-thumb">
              <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" alt="">
              <span th:unless="${item.imageUrl}" class="item-thumb-placeholder">📦</span>
            </div>
            <div class="item-info">
              <div class="item-name" th:text="${item.name}">商品名</div>
              <div class="item-meta" th:text="'補充目安：' + ${item.minStock} + '個'"></div>
            </div>
            <div class="item-badge">
              <span th:class="'badge badge--' + ${item.stockStatus}"
                    th:text="${item.stock} + '個'">
              </span>
              <span th:if="${item.linkedToShopping}" class="badge badge--linkle" title="Linkle買い物リストに追加済み">🛒Linkle</span>
            </div>
            <div class="item-actions">
              <form th:action="@{/items/{id}/stock(id=${item.id})}" method="post" style="display:inline">
                <input type="hidden" name="delta" value="1">
                <input type="hidden" name="returnTo" value="/dashboard">
                <button type="submit" class="btn-icon btn-icon--green">＋</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- 最近追加したアイテム -->
      <div class="card card--full">
        <div class="card-header">
          <h2 class="card-title">最近追加したアイテム</h2>
          <a th:href="@{/photos}" class="link-muted">すべて見る ›</a>
        </div>
        <div class="photo-grid">
          <a th:each="item : ${recentItems}"
             th:href="@{/items/{id}(id=${item.id})}"
             class="photo-item">
            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" th:alt="${item.name}">
            <div th:unless="${item.imageUrl}" class="photo-placeholder">📦</div>
            <div class="photo-label">
              <span th:text="${item.name}">商品名</span>
              <span th:if="${item.expiryDate}"
                    th:class="'badge badge--' + ${item.expiryStatus} + ' badge--sm'"
                    th:text="${item.daysUntilExpiry < 0 ? '期限切れ' :
                               item.daysUntilExpiry == 0 ? '今日' :
                               'あと' + item.daysUntilExpiry + '日'}">
              </span>
            </div>
          </a>
          <!-- 追加ボタン -->
          <a th:href="@{/items/new}" class="photo-item photo-item--add">
            <span class="photo-add-icon">＋</span>
            <span>追加する</span>
          </a>
        </div>
      </div>

    </div><!-- /.dashboard-grid -->
  </main>
</div>

<script th:src="@{/js/main.js}"></script>
<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center active">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
<script>
const VAPID_PUBLIC_KEY = 'BAghuyEwJkujYobJFsmwmkH6js6wMo5sEKVCIJEGVC5iXchf-S8uk7Bqoj001TuqUAEdhNdjxByWrt3hQ7EeL7w';

async function registerPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(sub.toJSON())
    });
    console.log('プッシュ通知登録完了');
  } catch(e) {
    console.log('プッシュ通知登録失敗:', e);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function requestPush() {
  await registerPush();
  document.getElementById('push-banner').classList.remove('show');
  localStorage.setItem('push_registered', 'true');
}

window.addEventListener('load', function() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  var banner = document.getElementById('push-banner');
  if (Notification.permission === 'default' && !localStorage.getItem('push_registered')) {
    banner.classList.add('show');
  }
});
</script>
</body>
</html>
