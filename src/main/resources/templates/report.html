<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月次レポート - Shelfy</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta name="apple-mobile-web-app-title" content="Shelfy">
  <link rel="apple-touch-startup-image" href="/splash/splash_2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1668x2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1536x2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1242x2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_750x1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/splash/splash_640x1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
</head>
<body>
<div th:replace="~{fragments/header :: header('report')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('report')}"></div>
  <main class="main-content" style="padding-bottom:100px;">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
      <h1 style="font-size:18px; font-weight:700; color:var(--text); margin:0;">月次レポート</h1>
    </div>

    <!-- 月選択 -->
    <div style="display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; background:#fff; border-radius:12px; padding:12px; border:0.5px solid var(--border);">
      <a th:href="@{/report(month=${prevMonth})}" style="color:var(--primary); text-decoration:none; font-size:20px; font-weight:700;">‹</a>
      <span style="font-size:16px; font-weight:700; color:var(--text);" th:text="${ym.year + '年' + ym.monthValue + '月'}"></span>
      <a th:href="@{/report(month=${nextMonth})}" style="color:var(--primary); text-decoration:none; font-size:20px; font-weight:700;">›</a>
    </div>

    <!-- サマリーカード -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;">
      <div style="background:#fff; border-radius:12px; padding:16px; border:0.5px solid #e2e8f0;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">今月の消費数</div>
        <div style="font-size:28px; font-weight:800; color:#0ea5e9; line-height:1;" th:text="${totalConsumed}">0</div>
        <div style="font-size:11px; color:#94a3b8; margin-top:4px;">使い切った個数</div>
      </div>
      <div style="background:#fff; border-radius:12px; padding:16px; border:0.5px solid #fca5a5;">
        <div style="font-size:11px; color:#94a3b8; font-weight:500; margin-bottom:6px;">現在の期限切れ</div>
        <div style="font-size:28px; font-weight:800; color:#ef4444; line-height:1;" th:text="${expiredCount}">0</div>
        <div style="font-size:11px; color:#94a3b8; margin-top:4px;">要処分アイテム</div>
      </div>
    </div>

    <!-- カテゴリ別消費グラフ -->
    <div th:if="${!categoryCount.isEmpty()}" style="background:#fff; border-radius:12px; border:0.5px solid var(--border); padding:16px; margin-bottom:16px;">
      <div style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:12px;">カテゴリ別消費数</div>
      <canvas id="categoryChart" style="max-height:200px; width:100%;"></canvas>
    </div>

    <!-- 消費ログ -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">今月の消費ログ</h2>
        <span style="font-size:12px; color:var(--text-muted);" th:text="${monthLogs.size()} + '件'"></span>
      </div>
      <div class="item-list">
        <div th:if="${#lists.isEmpty(monthLogs)}" class="empty-state">
          <i class="ti ti-history" style="font-size:40px; color:var(--text-muted);"></i>
          <p style="margin-top:12px;">今月の消費記録はありません</p>
        </div>
        <div th:each="log : ${monthLogs}"
             style="display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border);">
          <div style="width:36px; height:36px; background:#dcfce7; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <i class="ti ti-check" style="font-size:18px; color:#16a34a;"></i>
          </div>
          <div style="flex:1;">
            <div style="font-weight:600; font-size:14px;" th:text="${log.itemName}"></div>
            <div style="font-size:12px; color:var(--text-muted); margin-top:2px;"
                 th:text="${#temporals.format(log.consumedAt, 'yyyy/MM/dd HH:mm')}"></div>
          </div>
          <span style="background:#dcfce7; color:#16a34a; font-size:12px; font-weight:600; padding:3px 8px; border-radius:20px;"
                th:text="${log.quantity} + '個'"></span>
        </div>
      </div>
    </div>

  </main>
</div>

<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>

<script th:inline="javascript">
var categoryData = /*[[${categoryCount}]]*/ {};
if (Object.keys(categoryData).length > 0) {
  var labels = Object.keys(categoryData).map(function(k) {
    return k === 'food' ? '食品' : k === 'seasoning' ? '調味料' : k === 'daily' ? '日用品' : k === 'drink' ? '飲料' : 'その他';
  });
  var data = Object.values(categoryData);
  new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: ['#0ea5e9','#fbbf24','#22c55e','#8b5cf6','#94a3b8'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: window.innerWidth < 768 ? 11 : 13 }, boxWidth: 12, padding: 8 }
        }
      }
    }
  });
}
</script>







<script>
function shelfyOpenMenu() {
  document.getElementById('side-overlay').style.display = 'block';
  document.getElementById('side-panel').style.transform = 'translateX(0)';
}
function shelfyCloseMenu() {
  document.getElementById('side-overlay').style.display = 'none';
  document.getElementById('side-panel').style.transform = 'translateX(-100%)';
}
</script>

<div id="side-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200;" onclick="shelfyCloseMenu()"></div>
<div id="side-panel" style="position:fixed; top:0; left:0; bottom:0; width:280px; background:#fff; z-index:201; transform:translateX(-100%); transition:transform .25s ease; display:flex; flex-direction:column; box-shadow:4px 0 20px rgba(0,0,0,.12);">
  <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 20px 16px; border-bottom:1px solid #f1f5f9; margin-top:60px;">
    <span style="font-size:17px; font-weight:700; color:#1e293b;">Shelfy</span>
    <button onclick="shelfyCloseMenu()" style="background:none;border:none;cursor:pointer;padding:4px;"><i class="ti ti-x" style="font-size:22px; color:#94a3b8;"></i></button>
  </div>
  <nav style="padding:12px 0; flex:1; overflow-y:auto;">
    <a href="/score" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-medal" style="font-size:20px;color:#f59e0b;"></i>スコア・バッジ</a>
    <a href="/groups" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-users" style="font-size:20px;color:#94a3b8;"></i>グループ選択</a>
    <a href="/shopping" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-shopping-cart" style="font-size:20px;color:#94a3b8;"></i>買い物リスト</a>
    <a href="/consumption" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-history" style="font-size:20px;color:#94a3b8;"></i>消費ログ</a>
    <a href="/report" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-chart-pie" style="font-size:20px;color:#94a3b8;"></i>月次レポート</a>
    <a href="/dashboard" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-home" style="font-size:20px;color:#94a3b8;"></i>ホーム</a>
    <a href="/daily" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-package" style="font-size:20px;color:#94a3b8;"></i>日用品管理</a>
    <a href="/food" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-salad" style="font-size:20px;color:#94a3b8;"></i>食品・調味料管理</a>
    <a href="/alerts" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-bell" style="font-size:20px;color:#94a3b8;"></i>アラート</a>
    <div style="height:1px;background:#f1f5f9;margin:8px 0;"></div>
    <a href="/logout" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#ef4444;text-decoration:none;font-size:15px;font-weight:500;"><i class="ti ti-logout" style="font-size:20px;color:#ef4444;"></i>ログアウト</a>
  </nav>
</div>
</body>
</html>
