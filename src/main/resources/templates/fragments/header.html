<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
<header th:fragment="header(activePage)" class="app-header">
  <div class="header-inner">
    <button class="header-icon-btn" aria-label="メニュー" style="background:none;border:none;cursor:pointer;" onclick="shelfyOpenMenu()">
      <i class="ti ti-menu-2" style="font-size:22px; color:#94a3b8;"></i>
    </button>
    <a th:href="@{/dashboard}" class="header-logo" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
      <div style="display:flex;flex-direction:column;gap:3px;">
        <div style="display:flex;gap:3px;">
          <div style="width:5px;height:5px;background:#fbbf24;border-radius:1px;"></div>
          <div style="width:5px;height:5px;background:#fbbf24;border-radius:1px;"></div>
        </div>
        <div style="width:13px;height:1.5px;background:#e2e8f0;border-radius:1px;"></div>
        <div style="display:flex;gap:3px;">
          <div style="width:5px;height:5px;background:#94a3b8;border-radius:1px;"></div>
          <div style="width:5px;height:5px;background:#fbbf24;border-radius:1px;"></div>
        </div>
      </div>
      <span style="font-size:19px;font-weight:700;color:#1e293b;letter-spacing:-0.3px;">Shelfy</span>
    </a>
    <a th:href="@{/alerts}" class="header-icon-btn" aria-label="アラート" style="text-decoration:none;">
      <i class="ti ti-bell" style="font-size:22px; color:#94a3b8;"></i>
    </a>
  </div>
</header>


        <div style="width:13px;height:1.5px;background:#e2e8f0;border-radius:1px;"></div>
        <div style="display:flex;gap:3px;">
          <div style="width:5px;height:5px;background:#94a3b8;border-radius:1px;"></div>
          <div style="width:5px;height:5px;background:#fbbf24;border-radius:1px;"></div>
        </div>
      </div>
      <span style="font-size:17px;font-weight:700;color:#1e293b;">Shelfy</span>
    </div>
    <button onclick="shelfyCloseMenu()" style="background:none;border:none;cursor:pointer;padding:4px;">
      <i class="ti ti-x" style="font-size:22px; color:#94a3b8;"></i>
    </button>
  </div>
  <nav style="padding:12px 0; flex:1; overflow-y:auto;">
    <a th:href="@{/dashboard}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-home" style="font-size:20px;color:#94a3b8;"></i>ホーム
    </a>
    <a th:href="@{/daily}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-package" style="font-size:20px;color:#94a3b8;"></i>日用品管理
    </a>
    <a th:href="@{/food}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-salad" style="font-size:20px;color:#94a3b8;"></i>食品・調味料管理
    </a>
    <a th:href="@{/alerts}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-bell" style="font-size:20px;color:#94a3b8;"></i>アラート
    </a>
    <a th:href="@{/score}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-medal" style="font-size:20px;color:#f59e0b;"></i>スコア・バッジ
    </a>
    <a th:href="@{/groups}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-users" style="font-size:20px;color:#94a3b8;"></i>グループ選択
    </a>
    <a th:href="@{/shopping}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-shopping-cart" style="font-size:20px;color:#94a3b8;"></i>買い物リスト
    </a>
    <a th:href="@{/consumption}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-history" style="font-size:20px;color:#94a3b8;"></i>消費ログ
    </a>
    <a th:href="@{/report}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#1e293b;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-chart-pie" style="font-size:20px;color:#94a3b8;"></i>月次レポート
    </a>
    <div style="height:1px;background:#f1f5f9;margin:8px 0;"></div>
    <a th:href="@{/logout}" style="display:flex;align-items:center;gap:14px;padding:14px 24px;color:#ef4444;text-decoration:none;font-size:15px;font-weight:500;">
      <i class="ti ti-logout" style="font-size:20px;color:#ef4444;"></i>ログアウト
    </a>
  </nav>
</div>


</body>
</html>
