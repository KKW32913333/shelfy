<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スコア・バッジ - Shelfy</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<div th:replace="~{fragments/header :: header('score')}"></div>
<div class="layout">
  <div th:replace="~{fragments/sidebar :: sidebar('score')}"></div>
  <main class="main-content" style="padding-bottom:100px;">

    <div style="margin-bottom:16px;">
      <h1 style="font-size:18px; font-weight:700; color:var(--text); margin:0;">スコア・バッジ</h1>
    </div>

    <!-- スコアカード -->
    <div style="background:linear-gradient(135deg,#0ea5e9,#0284c7); border-radius:16px; padding:24px; margin-bottom:16px; color:#fff; text-align:center;">
      <div style="font-size:13px; font-weight:500; opacity:.8; margin-bottom:8px;">現在のスコア</div>
      <div style="font-size:56px; font-weight:900; line-height:1;" th:text="${score.score}">0</div>
      <div style="font-size:12px; opacity:.7; margin-top:8px;">pt</div>
      <div style="display:flex; justify-content:center; gap:24px; margin-top:20px;">
        <div style="text-align:center;">
          <div style="font-size:22px; font-weight:800;" th:text="${score.totalConsumed}">0</div>
          <div style="font-size:11px; opacity:.7; margin-top:2px;">使い切り回数</div>
        </div>
        <div style="width:1px; background:rgba(255,255,255,.3);"></div>
        <div style="text-align:center;">
          <div style="font-size:22px; font-weight:800;" th:text="${score.zeroExpireDays}">0</div>
          <div style="font-size:11px; opacity:.7; margin-top:2px;">期限切れゼロ継続日</div>
        </div>
      </div>
    </div>

    <!-- スコアの仕組み -->
    <div style="background:#fff; border-radius:12px; border:0.5px solid var(--border); padding:16px; margin-bottom:16px;">
      <div style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:12px;">スコアの獲得方法</div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <div style="display:flex; justify-content:space-between; font-size:13px;">
          <span style="color:var(--text-muted);">✅ 使い切った（1個）</span>
          <span style="font-weight:700; color:#0ea5e9;">+10pt</span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:13px;">
          <span style="color:var(--text-muted);">🗓️ 期限切れゼロ（1日）</span>
          <span style="font-weight:700; color:#0ea5e9;">+5pt</span>
        </div>
      </div>
    </div>

    <!-- バッジ一覧 -->
    <div style="background:#fff; border-radius:12px; border:0.5px solid var(--border); overflow:hidden; margin-bottom:16px;">
      <div style="padding:14px 16px; border-bottom:0.5px solid var(--border); font-size:14px; font-weight:700;">獲得済みバッジ</div>
      <div th:if="${#lists.isEmpty(badges)}" class="empty-state">
        <i class="ti ti-medal" style="font-size:36px; color:var(--text-muted);"></i>
        <p style="margin-top:8px; font-size:13px;">まだバッジがありません</p>
        <p style="font-size:12px; color:var(--text-muted);">使い切りボタンを押してスコアを貯めよう！</p>
      </div>
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border);">
        <div th:each="badge : ${badges}"
             style="background:#fff; padding:16px 8px; text-align:center;">
          <div style="font-size:28px; margin-bottom:6px;" th:text="${badge.badgeName.split(' ')[0]}"></div>
          <div style="font-size:11px; font-weight:600; color:var(--text);"
               th:text="${badge.badgeName.substring(badge.badgeName.indexOf(' ')+1)}"></div>
          <div style="font-size:10px; color:var(--text-muted); margin-top:4px;"
               th:text="${#temporals.format(badge.earnedAt,'MM/dd')}"></div>
        </div>
      </div>
    </div>

    <!-- まだ獲得していないバッジ -->
    <div style="background:#fff; border-radius:12px; border:0.5px solid var(--border); overflow:hidden;">
      <div style="padding:14px 16px; border-bottom:0.5px solid var(--border); font-size:14px; font-weight:700;">獲得可能なバッジ</div>
      <div style="display:flex; flex-direction:column;">
        <div th:each="def : ${badgeDefs}"
             style="display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:0.5px solid var(--border);"
             th:unless="${earnedKeys.contains(def[0])}">
          <div style="font-size:28px; filter:grayscale(1); opacity:.3;" th:text="${def[2]}"></div>
          <div style="flex:1;">
            <div style="font-size:13px; font-weight:600; color:var(--text-muted);" th:text="${def[1]}"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>
<nav class="bottom-nav">
  <a href="/daily" class="bottom-nav-item">
    <i class="ti ti-package nav-icon" aria-hidden="true"></i>
    <span>日用品</span>
  </a>
  <a href="/food" class="bottom-nav-item">
    <i class="ti ti-salad nav-icon" aria-hidden="true"></i>
    <span>食品</span>
  </a>
  <a href="/dashboard" class="bottom-nav-center">
    <div class="nav-home-btn"><i class="ti ti-home" aria-hidden="true"></i></div>
    <span>ホーム</span>
  </a>
  <a href="/photos" class="bottom-nav-item">
    <i class="ti ti-photo nav-icon" aria-hidden="true"></i>
    <span>写真一覧</span>
  </a>
  <a href="/items/new" class="bottom-nav-item">
    <i class="ti ti-plus nav-icon" aria-hidden="true"></i>
    <span>追加</span>
  </a>
</nav>
</body>
</html>
