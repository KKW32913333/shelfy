# =============================================
# Shelfy - アプリケーション設定
# =============================================

server.port=${PORT:8082}
server.forward-headers-strategy=NATIVE
spring.application.name=shelfy

# =============================================
# Shelfy用DB（Neon PostgreSQL）
# DATABASE_URL未設定時はローカルH2を使用
# =============================================
shelfy.datasource.url=${SHELFY_DATABASE_URL:}
shelfy.datasource.hikari.maximum-pool-size=3
shelfy.datasource.hikari.minimum-idle=1
shelfy.datasource.hikari.connection-timeout=30000
shelfy.datasource.hikari.idle-timeout=600000
shelfy.datasource.hikari.max-lifetime=1800000
shelfy.datasource.hikari.ssl=true

# =============================================
# Linkle用DB（ユーザー・グループ共用 + 買い物リスト書き込み）
# =============================================
linkle.datasource.url=${LINKLE_DATABASE_URL:}

# =============================================
# JPA設定
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# =============================================
# Thymeleaf
# =============================================
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.encoding=UTF-8

# =============================================
# ファイルアップロード（写真）
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Cloudflare R2（画像ストレージ）
# =============================================
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key=${R2_ACCESS_KEY:}
r2.secret-key=${R2_SECRET_KEY:}
r2.bucket-name=${R2_BUCKET_NAME:shelfy-images}
r2.public-url=${R2_PUBLIC_URL:}

# =============================================
# H2コンソール（ローカル開発のみ）
# =============================================
spring.h2.console.enabled=${H2_CONSOLE:false}
spring.h2.console.path=/h2-console

# =============================================
# タイムゾーン
# =============================================
spring.jackson.time-zone=Asia/Tokyo
